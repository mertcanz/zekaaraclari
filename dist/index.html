## ChatGPT Ne İşe Yarar?

- **Metin yazma:** Blog, makale, e-posta, hikaye
- **Kod yazma:** Python, JavaScript, React
- **Çeviri:** 50+ dilde anında çeviri
- **Analiz:** PDF, Excel, görsel analiz
- **Arama:** Güncel bilgilere erişim

## Nasıl Ücretsiz Kullanılır?

1. [chat.openai.com](https://chat.openai.com) adresine gidin
2. Google veya e-posta ile kayıt olun
3. Hemen sormaya başlayın!

| Özellik | Ücretsiz | Plus ($20/ay) |
|---------|----------|---------------|
| GPT-4o mini | ✅ | ✅ |
| GPT-4o | Sınırlı | Sınırsız |
| Görsel üretme | ❌ | ✅ DALL-E |
| Hız | Normal | Öncelikli |

## İpuçları

1. Net ve spesifik sorular sorun
2. Rol verin: "Sen bir SEO uzmanısın..."
3. Adım adım isteyin
